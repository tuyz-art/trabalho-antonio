<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Turzin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">E</div>
      <span>Turzin</span>
    </div>

    <h1>Bem-vindo de volta!</h1>
    <p class="subtitle">Insira seus dados para acessar a plataforma.</p>

    <!-- Formulário -->
    <div class="form-group">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Nascimento@gmail.com.br"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input
        type="password"
        id="senha"
        name="senha"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <a href="home.html" class="btn btn-primary" style="margin-top: 6px; display: block;">
      Entrar
    </a>

    <div class="auth-footer">
      Não tem uma conta?
      <a href="cadastro.html">Cadastre-se aqui</a>
    </div>

  </div>

</body>
</html>
