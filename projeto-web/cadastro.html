<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — EduPortal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">E</div>
      <span>EduPortal</span>
    </div>

    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os campos abaixo para se cadastrar.</p>

    <!-- Formulário -->
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Maria da Silva"
        autocomplete="name"
      />
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="seuemail@exemplo.com"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input
        type="password"
        id="senha"
        name="senha"
        placeholder="Mínimo 8 caracteres"
        autocomplete="new-password"
      />
    </div>

    <div class="form-group">
      <label for="confirmar-senha">Confirmar senha</label>
      <input
        type="password"
        id="confirmar-senha"
        name="confirmar-senha"
        placeholder="Repita a senha"
        autocomplete="new-password"
      />
    </div>

    <a href="index.html" class="btn btn-primary" style="margin-top: 6px; display: block;">
      Cadastrar
    </a>

    <div class="auth-footer">
      Já tem uma conta?
      <a href="index.html">Voltar ao login</a>
    </div>

  </div>

</body>
</html>
